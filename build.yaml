# This file generates the GitHub Actions matrix.
# For simple board + shield combinations, add them to the top level board and
# shield arrays, for more control, add individual board + shield combinations
# to the `include` property. You can also use the `cmake-args` property to
# pass flags to the build command, `snippet` to add a Zephyr snippet, and
# `artifact-name` to assign a name to distinguish build outputs from each other:
#
# board: [ "nice_nano" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano
#     shield: reviung41
#   - board: nice_nano
#     shield: corne_left
#     snippet: studio-rpc-usb-uart
#     cmake-args: -DCONFIG_ZMK_STUDIO=y
#     artifact-name: corne_left_with_studio
#
---
# include:
#  # Left Half (Peripheral)
#  - board: nice_nano_v2
#    shield: corne_left
#  
#  # Right Half (Peripheral)
#  - board: nice_nano_v2
#    shield: corne_right
#
#  # The Dongle (Central)
#  - board: seeeduino_xiao_ble
#    shield: corne_v3_dongle
#    cmake-args: -DZMK_EXTRA_MODULES="${{ github.workspace }}" -DCONFIG_ZMK_MOUSE=y
#
#  # Reset firmware for the Dongle (in case of pairing issues)
#  - board: seeeduino_xiao_ble
#    shield: settings_reset
#
#  # Reset firmware for the Halves (highly recommended to have)
#  - board: nice_nano_v2
#    shield: settings_reset

include:
  # Левая половина
  - board: nice_nano_v2
    shield: corne_left peripheral
  
  # Правая половина
  - board: nice_nano_v2
    shield: corne_right peripheral

  # Сброс настроек половин
  - board: nice_nano_v2
    shield: settings_reset

  # Донгл
  - board: seeeduino_xiao_ble
    shield: corne_v3_dongle

  # Сброс настроек донгла
  - board: seeeduino_xiao_ble
    shield: settings_reset